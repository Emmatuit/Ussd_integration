# H2 Profile - Local Development & Testing
spring.datasource.url=jdbc:h2:mem:ussd_gateway;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=validate

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Disable security for local testing
ussd.security.test-mode=true

# Bank API points to embedded mock bank
bank.api.base-url=http://localhost:8080/mock-bank
bank.api.connection-timeout=5000
bank.api.read-timeout=10000

# Mock Bank Configuration
mockbank.default-pin=1234
mockbank.daily-limit=500000
mockbank.transaction-delay-ms=300

# Customer 1 - Ike Emmanuel (2 accounts, PIN 1234)
mockbank.accounts[0].msisdn=2348012345678
mockbank.accounts[0].account-number=1001234567
mockbank.accounts[0].account-name=Ike Emmanuel
mockbank.accounts[0].account-type=Savings
mockbank.accounts[0].balance=50000.00
mockbank.accounts[0].currency=NGN
mockbank.accounts[0].pin=1234

mockbank.accounts[1].msisdn=2348012345678
mockbank.accounts[1].account-number=1001234568
mockbank.accounts[1].account-name=John Doe
mockbank.accounts[1].account-type=Current
mockbank.accounts[1].balance=150000.00
mockbank.accounts[1].currency=NGN
mockbank.accounts[1].pin=1234

# Customer 2 - Jane Smith (1 account, PIN 5678)
mockbank.accounts[2].msisdn=2348098765432
mockbank.accounts[2].account-number=2009876543
mockbank.accounts[2].account-name=Jane Smith
mockbank.accounts[2].account-type=Savings
mockbank.accounts[2].balance=25000.00
mockbank.accounts[2].currency=NGN
mockbank.accounts[2].pin=5678

# Staging Bank API Configuration
staging.api.token=${STAGING_API_TOKEN:a3b3b6f1-dbe0-40ce-830e-2cdcd4679099}

# Redis Configuration (local)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=5000ms
spring.data.redis.ssl.enabled=${REDIS_SSL:false}

# Bank Cache TTL
bank.cache.ttl-seconds=86400

# Logging
logging.level.com.interswitch=DEBUG