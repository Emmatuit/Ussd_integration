# Application
spring.application.name=ussd-gateway
server.port=${SERVER_PORT:8080}
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=15s

# Default Profile - PostgreSQL (override with -Dspring-boot.run.profiles=h2 for local dev)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ussd_gateway}
spring.datasource.username=${DB_USERNAME:ussd_user}
spring.datasource.password=${DB_PASSWORD:changeme}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# USSD Security Configuration
ussd.security.hmac-secret-key=${HMAC_SECRET_KEY:default-hmac-key-change-in-production}
ussd.security.aes-secret-key=${AES_SECRET_KEY:default-aes-key-change-in-prod}
ussd.security.timestamp-threshold-seconds=${TIMESTAMP_THRESHOLD:30}

# Bank API Configuration
bank.api.connection-timeout=${BANK_API_CONNECTION_TIMEOUT:5000}
bank.api.read-timeout=${BANK_API_READ_TIMEOUT:10000}
# Bank API Configuration (production)
bank.api.base-url=${BANK_API_BASE_URL:https://api.realbank.com}

# Logging
logging.level.com.example.ussdgateway=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN

# Disable auto task execution config since we define our own
spring.task.execution.auto=false


ussd.security.test-mode=true

# Redis Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=5000ms

# Bank Cache TTL in seconds (24 hours)
bank.cache.ttl-seconds=86400