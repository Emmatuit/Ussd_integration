# Application
spring.application.name=interswitch_Ussd
server.port=${SERVER_PORT:8080}
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=15s

# Default Profile - PostgreSQL (override with -Dspring-boot.run.profiles=h2 for local dev)
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# USSD Security Configuration
ussd.security.hmac-secret-key=${HMAC_SECRET_KEY}
ussd.security.aes-secret-key=${AES_SECRET_KEY}
ussd.security.timestamp-threshold-seconds=${TIMESTAMP_THRESHOLD}

# Bank API Configuration
bank.api.connection-timeout=${BANK_API_CONNECTION_TIMEOUT}
bank.api.read-timeout=${BANK_API_READ_TIMEOUT}
# Bank API Configuration (production)
bank.api.base-url=${BANK_API_BASE_URL}

# Logging
logging.level.com.example.ussdgateway=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN

# Disable auto task execution config since we define our own
spring.task.execution.auto=false


ussd.security.test-mode=true

# Redis Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.timeout=5000ms

# Bank Cache TTL in seconds (24 hours)
bank.cache.ttl-seconds=86400


