<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>OlivePay USSD Simulator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            padding: 20px;
        }

        .phone {
            width: 380px;
            height: 700px;
            background: #000;
            border-radius: 50px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.3), inset 0 0 0 2px rgba(255,255,255,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .status-bar {
            background: #000;
            padding: 12px 20px 6px;
            display: flex;
            justify-content: space-between;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            font-family: monospace;
        }

        .time { font-weight: 600; }
        .battery { display: flex; gap: 4px; align-items: center; }

        .screen {
            flex: 1;
            background: #0a3b2f;
            background-image: radial-gradient(circle at 10% 20%, rgba(0,255,170,0.05) 1%, transparent 1%);
            background-size: 20px 20px;
            color: #e0f2fe;
            font-family: 'Courier New', monospace;
            padding: 20px 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .ussd-content {
            white-space: pre-wrap;
            font-size: 18px;
            line-height: 1.5;
            text-shadow: 0 0 2px #0ff;
            word-break: break-word;
        }

        .input-area {
            margin-top: 20px;
            border-top: 1px solid #2a9d8f;
            padding-top: 15px;
        }

        .ussd-input {
            width: 100%;
            background: #1e5a4f;
            border: none;
            padding: 12px;
            color: white;
            font-size: 18px;
            font-family: monospace;
            border-radius: 12px;
            outline: none;
            text-align: center;
            letter-spacing: 2px;
        }

        .ussd-input:focus {
            background: #2a7a6a;
            box-shadow: 0 0 0 2px #4ecdc4;
        }

        .keypad {
            background: #111;
            padding: 12px 8px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            border-top: 1px solid #333;
        }

        .key {
            background: #1f1f2f;
            border: none;
            padding: 14px 0;
            font-size: 22px;
            font-weight: bold;
            color: white;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .key:active {
            background: #4ecdc4;
            color: #000;
            transform: scale(0.96);
        }

        .key-special { background: #2c2c3a; color: #ffb347; }
        .key-send { background: #2a9d8f; color: white; }
        .key-clear { background: #c44536; color: white; }

        .session-badge {
            background: #00000088;
            backdrop-filter: blur(4px);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 11px;
            text-align: center;
            margin-bottom: 10px;
            font-family: monospace;
        }

        .screen::-webkit-scrollbar { width: 4px; }
        .screen::-webkit-scrollbar-track { background: #0a3b2f; }
        .screen::-webkit-scrollbar-thumb { background: #4ecdc4; border-radius: 4px; }

        .footer {
            font-size: 10px;
            text-align: center;
            padding: 8px;
            background: #000;
            color: #666;
        }
    </style>
</head>
<body>
<div class="phone">
    <div class="status-bar">
        <span class="time" id="liveTime">12:00</span>
        <span>📶 OlivePay</span>
        <span class="battery">🔋 100%</span>
    </div>
    <div class="screen" id="screen">
        <div>
            <div class="session-badge" id="sessionId">Ready</div>
            <div class="ussd-content" id="ussdText">
                Welcome to OlivePay<br><br>
                Dial *5151# to start
            </div>
        </div>
        <div class="input-area">
            <input type="text" id="ussdInput" class="ussd-input" placeholder="Type *5151# or option" maxlength="20">
        </div>
    </div>
    <div class="keypad">
        <button class="key" data-value="1">1</button><button class="key" data-value="2">2</button><button class="key" data-value="3">3</button>
        <button class="key" data-value="4">4</button><button class="key" data-value="5">5</button><button class="key" data-value="6">6</button>
        <button class="key" data-value="7">7</button><button class="key" data-value="8">8</button><button class="key" data-value="9">9</button>
        <button class="key key-special" data-value="*">*</button>
        <button class="key" data-value="0">0</button>
        <button class="key key-special" data-value="#">#</button>
        <button class="key key-clear" id="clearBtn">⌫</button>
        <button class="key key-send" id="sendBtn">📞 SEND</button>
        <button class="key key-special" id="resetBtn">🔄 RESET</button>
    </div>
    <div class="footer">OlivePay USSD | *5151#</div>
</div>

<script>
    // ---------- USSD State ----------
    let sessionData = {};
    let currentCallback = "/api/ussd/menu";   // will be set after *5151#
    let sessionId = null;
    let msisdn = "2348012345678";   // test phone number
    let waitingForDial = true;       // start in welcome state

    // DOM elements
    const ussdTextDiv = document.getElementById("ussdText");
    const sessionBadge = document.getElementById("sessionId");
    const inputField = document.getElementById("ussdInput");
    const sendBtn = document.getElementById("sendBtn");
    const clearBtn = document.getElementById("clearBtn");
    const resetBtn = document.getElementById("resetBtn");

    // Helper: update UI
    function updateUI(text, isWaiting = false) {
        ussdTextDiv.innerText = text;
        if (isWaiting) {
            sessionBadge.innerText = "Ready - Dial *5151#";
        } else {
            sessionBadge.innerText = sessionId ? "Session: " + sessionId.substring(0, 12) : "Active";
        }
    }

    // Reset to initial welcome screen (no session)
    function resetToWelcome() {
        waitingForDial = true;
        sessionData = {};
        currentCallback = null;
        sessionId = null;
        updateUI("Welcome to OlivePay\n\nDial *5151# to start", true);
        inputField.value = "";
        inputField.placeholder = "Type *5151# or option";
        // Clear any stored session in backend? Not needed, new session will start.
    }

    // Send request to backend
    async function sendUssdRequest(input) {
        // If we are waiting for dial and input is exactly *5151#, start new session
        if (waitingForDial && input === "*5151#") {
            waitingForDial = false;
            sessionId = "sim-" + Date.now();
            sessionData = {};
            currentCallback = "/api/ussd/menu";
            // Now send the *5151# to the menu endpoint
        } else if (waitingForDial && input !== "*5151#") {
            updateUI("Welcome to OlivePay\n\nPlease dial *5151# to start", true);
            inputField.value = "";
            return;
        }

        const payload = {
            msisdn: msisdn,
            sessionId: sessionId,
            input: input.toString(),
            sessionData: sessionData,
            sessionStart: false
        };

        let endpoint = currentCallback;
        if (!endpoint || endpoint === "") {
            endpoint = "/api/ussd/menu";
        }

        try {
            const response = await fetch(endpoint, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            const data = await response.json();

            // Update display
            updateUI(data.text || "No response");

            // Update session data
            if (data.sessionData) {
                sessionData = data.sessionData;
            } else {
                sessionData = {};
            }

            // Update callback URL for next step
            if (data.callbackUrl) {
                currentCallback = data.callbackUrl;
            } else {
                currentCallback = null;
            }

            // If session ended, show thank you and reset to welcome after 2 seconds
            if (data.sessionEnd) {
                updateUI("Thank you for banking with us!\n\nYou will be returned to the welcome screen.");
                setTimeout(() => {
                    resetToWelcome();
                }, 2000);
            }
        } catch (err) {
            updateUI("Network error: " + err.message + "\nCheck if backend is running on port 8080");
            console.error(err);
        }
    }

    // Event handlers
    function appendDigit(value) {
        inputField.value += value;
        inputField.focus();
    }

    document.querySelectorAll(".key[data-value]").forEach(btn => {
        btn.addEventListener("click", () => {
            appendDigit(btn.getAttribute("data-value"));
        });
    });

    clearBtn.addEventListener("click", () => {
        inputField.value = inputField.value.slice(0, -1);
        inputField.focus();
    });

    sendBtn.addEventListener("click", () => {
        let val = inputField.value.trim();
        if (val === "") return;
        inputField.value = "";
        sendUssdRequest(val);
    });

    resetBtn.addEventListener("click", () => {
        resetToWelcome();
    });

    inputField.addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
            e.preventDefault();
            sendBtn.click();
        }
    });

    // Update time
    function updateTime() {
        const now = new Date();
        document.getElementById("liveTime").innerText = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    }
    setInterval(updateTime, 1000);
    updateTime();

    // Start with welcome screen (no automatic dial)
    resetToWelcome();
</script>
</body>
</html>
